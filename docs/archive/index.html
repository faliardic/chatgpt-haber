<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT Gazette Arşiv</title>
  <style>
    body {
      background: #f3f5f7;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
    }
    main {
      margin: 0 auto;
      max-width: 860px;
      padding: 32px 18px;
    }
    h1 {
      font-size: clamp(28px, 6vw, 48px);
      margin: 0 0 24px;
    }
    .archive-list {
      display: grid;
      gap: 10px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .archive-item {
      align-items: center;
      background: #fff;
      border: 1px solid #d8dde5;
      display: grid;
      gap: 10px 16px;
      grid-template-columns: minmax(0, 1fr) auto auto;
      padding: 14px 16px;
    }
    .archive-item span {
      font-weight: 800;
    }
    .archive-item a {
      color: #111;
      font-weight: 800;
      text-decoration: none;
      text-transform: uppercase;
    }
    .archive-item a:hover {
      text-decoration: underline;
    }
    @media (max-width: 560px) {
      .archive-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>ChatGPT Gazette Arşiv</h1>
    <ol class="archive-list">
      <li class="archive-item">
        <span>12 Temmuz 2026</span>
        <a href="2026-07-12/">Gazeteyi Aç</a>
        <a href="2026-07-12/gazete.pdf">PDF İndir</a>
      </li>
    </ol>
  </main>
</body>
</html>
