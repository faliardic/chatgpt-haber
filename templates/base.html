<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ issue.title }} - {{ issue.issue_date }}</title>
  <link rel="stylesheet" href="{{ css_href }}">
  <style>
    @page {
      size: {{ issue.paper_size }} portrait;
      margin: 10mm 12mm 12mm 12mm;
    }
  </style>
</head>
<body>
  <main class="issue issue--{{ issue.paper_size|lower }}" id="top">
    {% for page in pages %}
      {% include "pages/" ~ page.template ~ ".html" %}
    {% endfor %}
    {% for article in pdf_detail_articles %}
      {% include "pdf_article_detail.html" %}
    {% endfor %}
  </main>
  <script>
    (() => {
      const targets = [
        [".story__headline", 7.2, "1.08"],
        [".story__dek", 5.2, "1.18"],
        [".story__body", 5.2, "1.18"],
        [".story__kicker", 4.8, "1.12"],
        [".story__source", 4.5, "1.12"]
      ];

      const pt = (value) => Number.parseFloat(value || "0");

      const shrink = (element, minSize, lineHeight) => {
        const style = window.getComputedStyle(element);
        const next = Math.max(minSize, pt(style.fontSize) * 0.92);
        element.style.fontSize = `${next}px`;
        element.style.lineHeight = lineHeight;
      };

      const overflowing = (element) =>
        element.scrollHeight > element.clientHeight + 1 ||
        element.scrollWidth > element.clientWidth + 1;

      const fitStory = (story) => {
        for (let step = 0; step < 28 && overflowing(story); step += 1) {
          for (const [selector, minSize, lineHeight] of targets) {
            story.querySelectorAll(selector).forEach((element) => shrink(element, minSize, lineHeight));
          }
        }
      };

      const fitRailItem = (item) => {
        const title = item.querySelector("a");
        if (!title) return;
        for (let step = 0; step < 18 && overflowing(item); step += 1) {
          shrink(title, 5.2, "1.12");
        }
      };

      const fitAll = () => {
        document.querySelectorAll(".story").forEach(fitStory);
        document.querySelectorAll(".front-rail__item").forEach(fitRailItem);
        window.__chatgptHaberFitDone = true;
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", fitAll);
      } else {
        fitAll();
      }
    })();
  </script>
</body>
</html>
