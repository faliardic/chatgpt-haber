<aside class="news-rail" aria-label="Son haberler">
  <div class="news-rail__title">Son Haberler</div>
  <ol class="news-rail__list">
    {% for article in page.briefs %}
      <li class="news-rail__item">
        <strong>{{ "%02d"|format(loop.index) }}</strong>
        <span>{{ article.headline }}</span>
        <em>{{ article.source_bundle[0].name }}</em>
      </li>
    {% endfor %}
  </ol>
</aside>
