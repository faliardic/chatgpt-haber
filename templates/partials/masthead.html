<header class="masthead">
  <div class="masthead__meta">
    <span>Üretim: {{ issue.generated_at|datetime_tr }}</span>
    <span>{{ issue.paper_size }} / {{ issue.page_count }} sayfa</span>
  </div>
  <div class="masthead__band">
    <div class="masthead__identity">
      <img class="masthead__mark" src="{{ mark_href }}" alt="" aria-hidden="true">
      <div class="masthead__wordmark" aria-label="ChatGPT Gazette">
        <span class="masthead__chatgpt">ChatGPT</span>
        <strong class="masthead__gazette">GAZETTE</strong>
      </div>
    </div>
  </div>
</header>
