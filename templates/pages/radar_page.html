<section class="page page--radar" data-page-no="{{ page.page_no }}">
  {% include "partials/masthead.html" %}
  <div class="section-bar">
    <strong>{{ page.name }}</strong>
    <span>Sayfa {{ page.page_no }}</span>
  </div>
  <div class="radar-grid">
    {% for article in page.articles %}
      <div class="radar-box">
        {% include "partials/article.html" %}
      </div>
    {% endfor %}
  </div>
</section>
